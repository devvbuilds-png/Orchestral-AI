  { from: 'pkb', to: 'synthesizer', type: 'data' },
  { from: 'pkb', to: 'gap-identifier', type: 'data' },
  { from: 'gap-identifier', to: 'interviewer', type: 'data' },
  { from: 'pkb', to: 'explainer', type: 'data' },
  { from: 'pkb', to: 'persona-extractor', type: 'data' },
  { from: 'persona-extractor', to: 'personas', type: 'data' },
  { from: 'persona-extractor', to: 'icps', type: 'data' },
  { from: 'persona-extractor', to: 'inbox', type: 'event' },
  { from: 'sensitive', to: 'inbox', type: 'event' },
  { from: 'conflicts', to: 'inbox', type: 'event' },
  { from: 'pkb', to: 'pkb-facts', type: 'dep' },
  { from: 'pkb', to: 'snapshots', type: 'dep' },
  { from: 'pkb', to: 'lifecycle', type: 'dep' },
  { from: 'pkb', to: 'sensitive', type: 'dep' },
  { from: 'pkb', to: 'conflicts', type: 'dep' },
  { from: 'pkb', to: 'staleness', type: 'dep' },
  { from: 'personas', to: 'mappings', type: 'dep' },
  { from: 'api', to: 'extractor', type: 'call' },
  { from: 'api', to: 'inbox', type: 'call' },
  { from: 'base-agent', to: 'extractor', type: 'dep' },
  { from: 'base-agent', to: 'synthesizer', type: 'dep' },
  { from: 'base-agent', to: 'gap-identifier', type: 'dep' },
  { from: 'base-agent', to: 'interviewer', type: 'dep' },
  { from: 'base-agent', to: 'explainer', type: 'dep' },
  { from: 'base-agent', to: 'persona-extractor', type: 'dep' },
  { from: 'ui-chat', to: 'api', type: 'call' },
  { from: 'ui-confidence', to: 'pkb', type: 'data' },
  { from: 'inbox', to: 'api', type: 'call' },
];

const EDGE_STYLES = {
  data:  { color: '#3b82f6', dash: 'none', label: 'data flow' },
  state: { color: '#22c55e', dash: 'none', label: 'state' },
  call:  { color: '#f97316', dash: '5,3', label: 'API call' },
  event: { color: '#ef4444', dash: '4,4', label: 'event' },
  dep:   { color: '#374151', dash: '3,5', label: 'dependency' },
};

// ─── STATE ─────────────────────────────────────────────────────────────────

const state = {
  scale: 1,
  tx: 0,
  ty: 0,
  selected: null,
  visibleCats: new Set(CATEGORIES.map(c => c.id)),
  dragging: false,
  dragStart: null,
};

const PRESETS = {
  full:     { scale: 0.72, tx: -10, ty: 10 },
  backend:  { scale: 0.85, tx: -200, ty: -20, hide: ['ui'] },
  frontend: { scale: 1.1,  tx: -600, ty: -100, show: ['ui', 'api', 'state'] },
  v1:       { scale: 0.82, tx: -30, ty: -250, show: ['governance', 'persona', 'state', 'agent'] },
};

// ─── RENDER ────────────────────────────────────────────────────────────────

const svg = document.getElementById('svg');
const W = 1100, H = 700;
svg.setAttribute('width', W);
svg.setAttribute('height', H);

function nodeCenter(n) {
  return { x: n.x + n.w / 2, y: n.y + n.h / 2 };
}

function buildSVG() {
  const visibleIds = new Set(NODES.filter(n => state.visibleCats.has(n.cat)).map(n => n.id));

  // Defs
  let defs = '<defs>';
  for (const [key, es] of Object.entries(EDGE_STYLES)) {
    defs += `<marker id="arr-${key}" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="${es.color}" opacity="0.8"/></marker>`;
  }
  defs += '</defs>';

  // Edges
  let edges = '';
  for (const e of EDGES) {
    if (!visibleIds.has(e.from) || !visibleIds.has(e.to)) continue;
    const a = NODES.find(n => n.id === e.from);
    const b = NODES.find(n => n.id === e.to);
    const ca = nodeCenter(a), cb = nodeCenter(b);
    const es = EDGE_STYLES[e.type];
    const mx = (ca.x + cb.x) / 2;
    const my = (ca.y + cb.y) / 2;
    const d = `M${ca.x},${ca.y} Q${mx},${my} ${cb.x},${cb.y}`;
    const dash = es.dash !== 'none' ? `stroke-dasharray="${es.dash}"` : '';
    edges += `<path d="${d}" stroke="${es.color}" stroke-width="1.5" fill="none" opacity="0.5" ${dash} marker-end="url(#arr-${e.type})"/>`;
  }

  // Nodes
  let nodes = '';
  for (const n of NODES) {
    if (!visibleIds.has(n.id)) continue;
    const c = COLORS[n.cat];
    const isSelected = state.selected === n.id;
    const strokeW = isSelected ? 2.5 : 1.5;
    const glow = isSelected ? `filter="url(#glow-${n.cat})"` : '';
    nodes += `
      <g class="node" data-id="${n.id}" style="cursor:pointer" onclick="selectNode('${n.id}')">
        <rect x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" rx="7"
          fill="${c.fill}" stroke="${c.stroke}" stroke-width="${strokeW}" opacity="0.95"/>
        <text x="${n.x + n.w/2}" y="${n.y + 15}" text-anchor="middle" font-size="11" font-weight="600" fill="${c.text}" font-family="system-ui">${n.label}</text>
        <text x="${n.x + n.w/2}" y="${n.y + 29}" text-anchor="middle" font-size="9" fill="${c.stroke}" opacity="0.7" font-family="monospace">${n.sub}</text>
      </g>`;
  }

  svg.innerHTML = defs + `<g id="diagram" transform="translate(${state.tx},${state.ty}) scale(${state.scale})">${edges}${nodes}</g>`;
}

// ─── LEGEND ────────────────────────────────────────────────────────────────

function buildLegend() {
  const leg = document.getElementById('legend');
  leg.innerHTML = CATEGORIES.map(c => {
    const col = COLORS[c.id];
    const off = !state.visibleCats.has(c.id) ? ' off' : '';
    return `<div class="legend-item${off}" onclick="toggleCat('${c.id}')">
      <span class="legend-dot" style="background:${col.dot}"></span>
      <span>${c.label}</span>
    </div>`;
  }).join('');
}

// ─── DETAIL PANEL ──────────────────────────────────────────────────────────

function selectNode(id) {
  state.selected = state.selected === id ? null : id;
  const node = NODES.find(n => n.id === id);
  const panel = document.getElementById('detail-panel');
  if (!node || !state.selected) { closeDetail(); return; }

  panel.classList.remove('hidden');
  document.getElementById('detail-title').textContent = node.label;
  document.getElementById('detail-subtitle').textContent = node.sub;

  const body = document.getElementById('detail-body');
  const c = COLORS[node.cat];
  const catInfo = CATEGORIES.find(x => x.id === node.cat);

  let html = `<div class="detail-section">
    <div class="detail-badge" style="background:${c.fill};color:${c.text};border:1px solid ${c.stroke}">${catInfo.label}</div>
    <p style="font-size:11px;color:#94a3b8;margin-top:8px;line-height:1.5">${node.detail.desc}</p>
  </div>`;

  for (const sec of node.detail.sections) {
    html += `<div class="detail-section"><h4>${sec.title}</h4>`;
    html += sec.items.map(item => `<div class="detail-item">${item}</div>`).join('');
    html += '</div>';
  }

  body.innerHTML = html;

  // Update prompt
  document.getElementById('prompt-out').textContent =
    `Focusing on: ${node.label} (${catInfo.label}) — ${node.detail.desc}`;

  buildSVG();
}

function closeDetail() {
  state.selected = null;
  document.getElementById('detail-panel').classList.add('hidden');
  document.getElementById('prompt-out').textContent = 'Click any node to explore its capabilities';
  buildSVG();
}

// ─── CONTROLS ──────────────────────────────────────────────────────────────

function toggleCat(id) {
  if (state.visibleCats.has(id)) state.visibleCats.delete(id);
  else state.visibleCats.add(id);
  buildLegend();
  buildSVG();
}

function zoom(factor) {
  state.scale = Math.min(3, Math.max(0.3, state.scale * factor));
  buildSVG();
}

function resetView() {
  state.scale = 0.72; state.tx = -10; state.ty = 10;
  state.visibleCats = new Set(CATEGORIES.map(c => c.id));
  buildLegend(); buildSVG();
}

function setPreset(name) {
  const p = PRESETS[name];
  state.scale = p.scale; state.tx = p.tx; state.ty = p.ty;
  if (p.show) state.visibleCats = new Set(p.show);
  else if (p.hide) { state.visibleCats = new Set(CATEGORIES.map(c => c.id)); p.hide.forEach(h => state.visibleCats.delete(h)); }
  else state.visibleCats = new Set(CATEGORIES.map(c => c.id));
  buildLegend(); buildSVG();
}

function copyPrompt() {
  const text = document.getElementById('prompt-out').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

// ─── PAN ───────────────────────────────────────────────────────────────────

const wrap = document.getElementById('canvas-wrap');

wrap.addEventListener('mousedown', e => {
  if (e.target.closest('.node')) return;
  state.dragging = true;
  state.dragStart = { x: e.clientX - state.tx, y: e.clientY - state.ty };
  wrap.classList.add('grabbing');
});

window.addEventListener('mousemove', e => {
  if (!state.dragging) return;
  state.tx = e.clientX - state.dragStart.x;
  state.ty = e.clientY - state.dragStart.y;
  buildSVG();
});

window.addEventListener('mouseup', () => {
  state.dragging = false;
  wrap.classList.remove('grabbing');
});

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1.1 : 0.9);
}, { passive: false });

// ─── INIT ──────────────────────────────────────────────────────────────────

buildLegend();
resetView();
</script>
</body>
</html>
